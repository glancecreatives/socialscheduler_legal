<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jahe Social Scheduler Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family: Arial; margin:0; background:#f8f9fb;}
header {background: linear-gradient(135deg,#d35400,#ff7a18); color:white; padding:20px; text-align:center;}
.container {max-width:950px; margin:auto; padding:20px;}
.card {background:white; padding:25px; border-radius:12px; margin-bottom:20px;}
button {background:#d35400;color:white;padding:10px;border:none;border-radius:6px;}
h3 {color:#d35400;}
</style>
</head>

<body>

<header>
<h2>Jahe Social Scheduler Dashboard</h2>
<p>Manage and schedule your TikTok content</p>
</header>

<div class="container">

<div class="card">
<h3>Connect Account</h3>
<p>Status: Connected</p>
<button>Reconnect</button>
</div>

<div class="card">
<h3>Create Content</h3>
<input type="file">
<textarea id="caption"></textarea>
<button onclick="preview()">Preview</button>
</div>

<div class="card">
<h3>Review</h3>
<p id="previewText">Content preview</p>
</div>

<div class="card">
<h3>Schedule</h3>
<input type="datetime-local">
<button onclick="done()">Publish</button>
<p id="status"></p>
</div>

</div>

<script>
function preview(){
document.getElementById("previewText").innerText =
document.getElementById("caption").value;
}

function done(){
document.getElementById("status").innerText="Post scheduled successfully";
}
</script>

</body>
</html>
