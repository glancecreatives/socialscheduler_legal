<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SocialScheduler Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f6fa;
  }

  header {
    background: #111;
    color: white;
    padding: 15px 20px;
  }

  .container {
    padding: 20px;
    max-width: 900px;
    margin: auto;
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ddd;
  }

  button {
    background: black;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.85;
  }

  .preview {
    border: 1px dashed #ccc;
    padding: 15px;
    border-radius: 8px;
    background: #fafafa;
  }

  .badge {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 6px;
    background: #eaeaea;
    font-size: 12px;
  }
</style>
</head>

<body>

<header>
  <h2>SocialScheduler Dashboard</h2>
</header>

<div class="container">

  <!-- CONNECT -->
  <div class="card">
    <h3>1. Connect TikTok Account</h3>
    <p>Status: <span class="badge">Connected</span></p>
    <button>Reconnect Account</button>
  </div>

  <!-- UPLOAD -->
  <div class="card">
    <h3>2. Create Content</h3>

    <label>Video File</label>
    <input type="file">

    <label>Caption</label>
    <textarea id="caption" placeholder="Write your caption..."></textarea>

    <button onclick="updatePreview()">Preview Content</button>
  </div>

  <!-- PREVIEW -->
  <div class="card">
    <h3>3. Review Content</h3>

    <div class="preview">
      <p><strong>Video:</strong> (preview simulated)</p>
      <p><strong>Caption:</strong></p>
      <p id="previewText">No caption yet</p>
    </div>
  </div>

  <!-- SCHEDULE -->
  <div class="card">
    <h3>4. Schedule Post</h3>

    <label>Select Date & Time</label>
    <input type="datetime-local">

    <button onclick="schedulePost()">Schedule & Publish</button>

    <p id="status" style="margin-top:15px;"></p>
  </div>

</div>

<script>
function updatePreview() {
  const caption = document.getElementById("caption").value;
  document.getElementById("previewText").innerText = caption || "No caption yet";
}

function schedulePost() {
  document.getElementById("status").innerText =
    "✅ Post scheduled successfully!";
}
</script>

</body>
</html>
